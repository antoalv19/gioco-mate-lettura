name: Pubblica il gioco

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v6
      - name: Installa pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Prepara Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Installa le dipendenze
        run: pnpm install --frozen-lockfile
      - name: Crea il sito
        run: pnpm run build
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v6
      - name: Prepara i file pubblicati
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
